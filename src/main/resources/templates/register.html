<!DOCTYPE html>
<html lang="en" class="bg-app">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — SentiConsult</title>
  <meta name="description" content="Create your SentiConsult account." />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="/assets/css/style.css" rel="stylesheet" />
</head>
<body>
  <main class="auth-page">
    <div class="glass-card auth-card fade-up" style="max-width:520px">
      <div class="text-center mb-4">
        <a href="/" class="navbar-brand-logo justify-content-center mb-3">
          <span class="logo-badge"><i class="bi bi-chat-heart-fill"></i></span> SentiConsult
        </a>
        <h3 class="fw-bold mb-1">Create your account</h3>
        <p class="text-muted mb-0">Start analyzing consultation feedback today</p>
      </div>

      <div id="alertArea"></div>

      <form id="registerForm" novalidate>
        <div class="mb-3">
          <label class="form-label fw-500">Full Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
            <input type="text" class="form-control" id="fullname" placeholder="Jane Doe" required />
          </div>
        </div>
        <div class="row g-3">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-500">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-at"></i></span>
              <input type="text" class="form-control" id="username" placeholder="janedoe" required />
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-500">Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" id="email" placeholder="jane@mail.com" required />
            </div>
          </div>
        </div>
        <div class="mb-2">
          <label class="form-label fw-500">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="Create a strong password" required oninput="checkStrength()" />
            <span class="input-group-text" role="button" onclick="togglePw('password', this)"><i class="bi bi-eye"></i></span>
          </div>
        </div>
        <div class="mb-3">
          <div class="strength-bar"><span id="strengthFill"></span></div>
          <small id="strengthText" class="text-muted">Password strength</small>
        </div>
        <div class="mb-4">
          <label class="form-label fw-500">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" class="form-control" id="confirm" placeholder="Re-enter your password" required />
          </div>
        </div>
        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="terms" required />
          <label class="form-check-label small" for="terms">I agree to the Terms of Service and Privacy Policy</label>
        </div>
        <button type="submit" class="btn btn-gradient w-100 btn-lg mb-3">
          <i class="bi bi-person-plus me-2"></i>Create Account
        </button>
        <p class="text-center text-muted mb-0 small">
          Already have an account? <a href="/login" class="text-primary-brand fw-600">Login</a>
        </p>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/main.js"></script>
  <script>
    function togglePw(id, el) {
      const input = document.getElementById(id);
      const icon = el.querySelector("i");
      const show = input.type === "password";
      input.type = show ? "text" : "password";
      icon.className = show ? "bi bi-eye-slash" : "bi bi-eye";
    }
    function checkStrength() {
      const p = document.getElementById("password").value;
      const fill = document.getElementById("strengthFill");
      const text = document.getElementById("strengthText");
      let score = 0;
      if (p.length >= 8) score++;
      if (/[A-Z]/.test(p)) score++;
      if (/[0-9]/.test(p)) score++;
      if (/[^A-Za-z0-9]/.test(p)) score++;
      const levels = [
        { w: "0%", c: "var(--border)", t: "Password strength" },
        { w: "25%", c: "var(--danger)", t: "Weak" },
        { w: "50%", c: "var(--warning)", t: "Fair" },
        { w: "75%", c: "var(--secondary)", t: "Good" },
        { w: "100%", c: "var(--accent)", t: "Strong" },
      ];
      const lvl = levels[score];
      fill.style.width = lvl.w;
      fill.style.background = lvl.c;
      text.textContent = lvl.t;
      text.style.color = score >= 3 ? lvl.c : "var(--text-muted)";
    }
    document.getElementById("registerForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const area = document.getElementById("alertArea");
      const pw = document.getElementById("password").value;
      const cf = document.getElementById("confirm").value;
      if (pw !== cf) {
        area.innerHTML = `<div class="alert alert-danger d-flex align-items-center gap-2 rounded-3 py-2"><i class="bi bi-exclamation-circle"></i> Passwords do not match.</div>`;
        return;
      }
      area.innerHTML = `<div class="alert alert-success d-flex align-items-center gap-2 rounded-3 py-2"><i class="bi bi-check-circle"></i> Account created! Redirecting to login…</div>`;
      showToast("Account created successfully!", "success");
      setTimeout(() => (window.location.href = "login.html"), 1300);
    });
  </script>
</body>
</html>
