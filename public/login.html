<!DOCTYPE html>
<html lang="en" class="bg-app">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SentiConsult</title>
  <meta name="description" content="Login to your SentiConsult account." />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="assets/css/style.css" rel="stylesheet" />
</head>
<body>
  <main class="auth-page">
    <div class="glass-card auth-card fade-up">
      <div class="text-center mb-4">
        <a href="index.html" class="navbar-brand-logo justify-content-center mb-3">
          <span class="logo-badge"><i class="bi bi-chat-heart-fill"></i></span> SentiConsult
        </a>
        <h3 class="fw-bold mb-1">Welcome back</h3>
        <p class="text-muted mb-0">Sign in to access your dashboard</p>
      </div>

      <!-- Validation message area -->
      <div id="alertArea"></div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label fw-500">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="username" placeholder="Enter your username" required />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-500">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="Enter your password" required />
            <span class="input-group-text" role="button" onclick="togglePw('password', this)"><i class="bi bi-eye"></i></span>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember" />
            <label class="form-check-label small" for="remember">Remember me</label>
          </div>
          <a href="#" class="small text-primary-brand fw-500">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-gradient w-100 btn-lg mb-3">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>
        <p class="text-center text-muted mb-0 small">
          Don&apos;t have an account? <a href="register.html" class="text-primary-brand fw-600">Register</a>
        </p>
      </form>
      <div class="text-center mt-3">
        <a href="index.html" class="small text-muted"><i class="bi bi-arrow-left me-1"></i>Back to home</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    function togglePw(id, el) {
      const input = document.getElementById(id);
      const icon = el.querySelector("i");
      const show = input.type === "password";
      input.type = show ? "text" : "password";
      icon.className = show ? "bi bi-eye-slash" : "bi bi-eye";
    }
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const u = document.getElementById("username").value.trim();
      const p = document.getElementById("password").value.trim();
      const area = document.getElementById("alertArea");
      if (!u || !p) {
        area.innerHTML = `<div class="alert alert-danger d-flex align-items-center gap-2 rounded-3 py-2"><i class="bi bi-exclamation-circle"></i> Please enter both username and password.</div>`;
        return;
      }
      area.innerHTML = `<div class="alert alert-success d-flex align-items-center gap-2 rounded-3 py-2"><i class="bi bi-check-circle"></i> Login successful! Redirecting…</div>`;
      showToast("Welcome back to SentiConsult!", "success");
      setTimeout(() => (window.location.href = "dashboard.html"), 1200);
    });
  </script>
</body>
</html>
